name: security

on:
  push:
  pull_request:

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

      - name: Bandit high severity scan
        run: bandit -r app.py core services test_db.py -x tests -q --severity-level high

      - name: Safety dependency scan
        run: safety check -r requirements.txt

      - name: Secret pattern scan
        run: |
          ! grep -RInE "(postgresql://post[g]res|BEGIN PRIVATE KE[Y]|AUTHENTICATION_API_KE[Y]=|clienteiro-dev-ke[y]-2026)" \
            --exclude-dir=.git \
            --exclude-dir=.venv \
            --exclude-dir=node_modules \
            .

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Audit WhatsApp bot
        run: npm --prefix whatsapp_bot audit --audit-level=high --omit=dev

      - name: Audit roulette webhook
        run: npm --prefix roulette_webhook audit --audit-level=high --omit=dev
